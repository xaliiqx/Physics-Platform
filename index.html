<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-firestore-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-storage-compat.min.js"></script>
<script type="module">
  // Firebase AI Logic (Gemini Developer API) — free tier, no billing account
  // required. Loaded as a separate named app instance so it never collides
  // with the compat SDK app used for Firestore/Storage above.
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';
  import { getAI, getGenerativeModel, GoogleAIBackend } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-ai.js';

  const aiFirebaseConfig = {
    apiKey: "AIzaSyBsXLpC1x3nw8UPA2QWVBKhhAnRKjV0RPc",
    authDomain: "physical-1-fd535.firebaseapp.com",
    projectId: "physical-1-fd535",
    storageBucket: "physical-1-fd535.firebasestorage.app",
    messagingSenderId: "1023621128960",
    appId: "1:1023621128960:web:c71f53a48677b03ab649e5"
  };

  const TUTOR_SYSTEM_INSTRUCTION = `أنت مساعد تعليمي لمادة الفيزياء لطلاب العراق (من الأول متوسط إلى السادس العلمي)، تشتغل داخل منصة تعليمية.
قواعدك:
1. لا تعطِ الجواب النهائي مباشرة أبداً. اشرح خطوة بخطوة وشجّع الطالب يفكر ويحاول بنفسه بين كل خطوة والثانية.
2. اربط الحل بالقوانين والوحدات الفيزيائية الصحيحة، واذكر القانون المستخدم بوضوح.
3. استخدم لغة عربية بسيطة وواضحة تناسب عمر الطالب، وتجنب الرموز المعقدة غير الضرورية.
4. إذا كان السؤال غامضاً أو ناقص المعطيات، اسأل الطالب عن التفاصيل الناقصة بدل التخمين.
5. إذا سأل الطالب عن شيء خارج مادة الفيزياء تماماً، اعتذر بلطف ووجّهه للتركيز على المادة.
6. خلّي ردودك مختصرة ومركزة (فقرات قصيرة)، لا تكتب مقالاً طويلاً.`;

  let _chatModel = null;
  function getChatModel(){
    if(_chatModel) return _chatModel;
    const aiApp = initializeApp(aiFirebaseConfig, 'aiLogicApp');
    const ai = getAI(aiApp, { backend: new GoogleAIBackend() });
    _chatModel = getGenerativeModel(ai, {
      model: 'gemini-2.5-flash-lite',
      systemInstruction: TUTOR_SYSTEM_INSTRUCTION
    });
    return _chatModel;
  }

  let _genModel = null;
  function getGenModel(){
    if(_genModel) return _genModel;
    const aiApp = initializeApp(aiFirebaseConfig, 'aiLogicApp2');
    const ai = getAI(aiApp, { backend: new GoogleAIBackend() });
    _genModel = getGenerativeModel(ai, { model: 'gemini-2.5-flash-lite' });
    return _genModel;
  }

  // Ask the tutor a question, with optional prior turns for context.
  // history: array of {role:'user'|'model', text}
  window.askPhysicsAI = async function(prompt, history){
    const model = getChatModel();
    const chat = model.startChat({
      history: (history||[]).map(h=>({ role: h.role, parts: [{ text: h.text }] }))
    });
    const result = await chat.sendMessage(prompt);
    return result.response.text();
  };

  // Generate N practice questions for a topic/difficulty as structured JSON.
  window.generatePhysicsQuestions = async function(topic, difficulty, count){
    const model = getGenModel();
    const prompt = `اكتب ${count} أسئلة أو مسائل فيزيائية أصلية بمستوى صعوبة "${difficulty}" عن موضوع: "${topic}".
لكل سؤال أعطِ: عنوان قصير (title)، نص السؤال كاملاً مع المعطيات (content)، والصيغة أو القانون المستخدم للحل إن وجد (formula، اتركه فارغاً إن لم يوجد).
أجب بصيغة JSON فقط، مصفوفة من الكائنات بهذا الشكل: [{"title":"...","content":"...","formula":"..."}]`;
    const result = await model.generateContent({
      contents: [{ role:'user', parts:[{ text: prompt }] }],
      generationConfig: { responseMimeType: 'application/json' }
    });
    const raw = result.response.text();
    try{
      return JSON.parse(raw);
    }catch(e){
      const match = raw.match(/\[[\s\S]*\]/);
      if(match) return JSON.parse(match[0]);
      throw new Error('تعذّر فهم رد الذكاء الاصطناعي.');
    }
  };
</script>

.item-body{color:var(--chalk-dim); line-height:1.9; font-size:.98rem; white-space:pre-wrap;}

  border:1px dashed var(--line-strong); padding:10px 14px; border-radius:6px; margin-top:10px; display:inline-block; font-size:.95rem;

.activity-note{

}
.slider-row{display:flex; flex-direction:column; gap:6px;}
.slider-head{display:flex; justify-content:space-between; align-items:center; font-size:.88rem;}
.slider-label{color:var(--chalk-dim); font-weight:600;}
.slider-value{font-family:'Space Mono',monospace; color:var(--yellow); direction:ltr;}
.slider-row input[type=range]{

}
.slider-row input[type=range]::-webkit-slider-thumb{

}
.slider-row input[type=range]::-moz-range-thumb{
  width:18px; height:18px; border-radius:50%; background:var(--blue); cursor:pointer; border:2px solid var(--surface);
}
.formula-panel{
  font-family:'Space Mono',monospace; color:var(--blue); background:#141F19; border:1px dashed var(--line-strong);
  border-radius:8px; padding:14px; text-align:center; direction:ltr; font-size:1.05rem; line-height:1.8;
}
.formula-panel small{display:block; font-family:'IBM Plex Sans Arabic'; direction:rtl; color:var(--muted); font-size:.78rem; margin-top:6px;}
.activity-toggle-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px 18px; margin-bottom:10px;
}
.switch{position:relative; width:44px; height:24px; flex-shrink:0;}
.piston-handle{
  position:absolute; left:50%; transform:translateX(-50%); width:120px; height:18px;
  background:linear-gradient(180deg,#8291AC,#547059); border-radius:4px; cursor:grab; touch-action:none;
  box-shadow:0 3px 6px rgba(0,0,0,.4); border:1px solid #3D5344;
}
.piston-handle:active{cursor:grabbing;}
.piston-handle::after{content:'⬍ اسحب'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:.65rem; color:#1B2620; font-family:'IBM Plex Sans Arabic'; font-weight:700;}
.drag-rock{
  position:absolute; font-size:36px; cursor:grab; touch-action:none; user-select:none; line-height:1;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));
}
.drag-rock:active{cursor:grabbing;}
.drag-hint{font-size:.75rem; color:var(--muted); margin-top:8px;}
.switch input{opacity:0; width:0; height:0;}
.slider-toggle{
  position:absolute; cursor:pointer; inset:0; background:var(--line-strong); border-radius:24px; transition:.2s;
}
.slider-toggle::before{
  content:''; position:absolute; width:18px; height:18px; right:3px; bottom:3px; background:var(--chalk); border-radius:50%; transition:.2s;
}
.switch input:checked + .slider-toggle{background:var(--yellow);}
.switch input:checked + .slider-toggle::before{transform:translateX(-20px);}

  text-align:center; padding:60px 20px; color:var(--muted); border:2px dashed var(--line); border-radius:10px;
}
.empty-state b{display:block; color:var(--chalk); font-family:'Aref Ruqaa',serif; font-size:1.3rem; margin-bottom:6px;}

.hw-actions{margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;}
.self-rate-row{
  margin-top:14px; padding-top:12px; border-top:1px dashed var(--line);

.btn-sm{ padding:6px 14px; font-size:.82rem; }
.btn{

.btn-yellow:hover{background:#f5da8c;}

.btn-danger{background:transparent; border:2px dashed var(--danger); color:var(--danger);}
.btn-danger:hover{background:var(--danger); color:#1B2620;}
.btn-blue{background:var(--blue); color:#122229;}
.btn-blue:hover{background:#a9d4de;}
.btn:disabled{opacity:.5; cursor:not-allowed;}

.modal{

    { title:'مصادر الطاقة المتجددة وغير المتجددة', formula:'', content:'الطاقة المتجددة (كالشمسية والرياح والمائية) لا تنفد وصديقة للبيئة، بينما الطاقة غير المتجددة (كالوقود الأحفوري والنووي) محدودة وقابلة للنفاد.' }

      root.innerHTML = `<a class="telegram-btn" href="${esc(link)}" target="_blank" rel="noopener">✈ قناة تلغرام</a>`;

function toast(msg, type=''){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastRoot').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
function esc(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtSize(d){
  let bytes = d && d.fileSize;
  if(!bytes && d && d.fileData) bytes = (d.fileData||'').length * 0.75;
  if(!bytes) return '—';
  if(bytes > 1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  return (bytes/1024).toFixed(0) + ' KB';
}

/* ================= THEME TOGGLE ================= */
function applyTheme(theme){
  document.body.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggleBtn');
  if(btn) btn.textContent = theme==='light' ? '☀️' : '🌙';
  localStorage.setItem('physicsPlatformTheme', theme);
}
function toggleTheme(){
  const current = document.body.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(current==='light' ? 'dark' : 'light');
}
(function initTheme(){
  const saved = localStorage.getItem('physicsPlatformTheme');
  if(saved) applyTheme(saved);
  else{
    const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    applyTheme(prefersLight ? 'light' : 'dark');
  }
})();

/* ================= STUDENT PROFILE / GAMIFICATION ================= */
function sanitizeForId(s){
  return String(s||'').trim().replace(/[\/\.\#\$\[\]]/g,'').replace(/\s+/g,'_').slice(0,60);
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function loadLocalProfile(){
  try{ return JSON.parse(localStorage.getItem('physicsStudentProfile')||'null'); }catch(e){ return null; }
}
function saveLocalProfile(p){ localStorage.setItem('physicsStudentProfile', JSON.stringify(p)); }
function clearLocalProfile(){ localStorage.removeItem('physicsStudentProfile'); }

function setProfileMode(mode){
  document.getElementById('pmNewPane').style.display = mode==='new' ? 'block':'none';
  document.getElementById('pmLoginPane').style.display = mode==='login' ? 'block':'none';
  document.getElementById('pmNewBtn').classList.toggle('active', mode==='new');
  document.getElementById('pmLoginBtn').classList.toggle('active', mode==='login');
}

function createProfile(){
  const name = document.getElementById('pmName').value.trim();
  const gradeId = document.getElementById('pmGrade').value;
  const msg = document.getElementById('pmMsg');
  if(!name){ msg.className='modal-msg err'; msg.textContent='الرجاء إدخال اسمك.'; return; }
  const code = String(Math.floor(1000 + Math.random()*9000));
  const studentId = gradeId + '__' + code + '__' + sanitizeForId(name);
  const docRef = db.collection(COL_STUDENTS).doc(studentId);
  docRef.get().then(snap=>{
    if(snap.exists){ createProfile(); return; } // extremely unlikely collision, retry
    const data = {
      name, gradeId, code,
      points:0, streak:0, homeworkCount:0,
      lastActiveDate: todayStr(),
      badges:[], submittedHomeworkIds:[],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    docRef.set(data).then(()=>{
      const profile = { studentId, name, gradeId, code };
      saveLocalProfile(profile);
      msg.className='modal-msg ok';
      msg.innerHTML = 'تم إنشاء حسابك بنجاح ✓ <br>احفظ رمزك: <b style="font-size:1.3rem; letter-spacing:3px;">'+code+'</b> (تحتاجه لو دخلت من جهاز آخر)';
      setTimeout(()=>{ closeModal(); render(); }, 2400);
    });
  });
}

function loginProfile(){
  const name = document.getElementById('pmLoginName').value.trim();
  const gradeId = document.getElementById('pmLoginGrade').value;
  const code = document.getElementById('pmLoginCode').value.trim();
  const msg = document.getElementById('pmMsg');
  if(!name || !/^\d{4}$/.test(code)){ msg.className='modal-msg err'; msg.textContent='أدخل الاسم والرمز المكوّن من 4 أرقام بشكل صحيح.'; return; }
  const studentId = gradeId + '__' + code + '__' + sanitizeForId(name);
  db.collection(COL_STUDENTS).doc(studentId).get().then(snap=>{
    if(!snap.exists){ msg.className='modal-msg err'; msg.textContent='لم يتم العثور على حساب مطابق. تأكد من الاسم والصف والرمز.'; return; }
    const profile = { studentId, name, gradeId, code };
    saveLocalProfile(profile);
    msg.className='modal-msg ok'; msg.textContent='تم تسجيل الدخول ✓';
    setTimeout(()=>{ closeModal(); render(); }, 900);
  });
}

function logoutProfile(){
  if(!confirm('هل تريد تسجيل الخروج من هذا الجهاز؟ (حسابك ونقاطك تبقى محفوظة ويمكنك الدخول لاحقاً بالاسم والرمز)')) return;
  clearLocalProfile();
  render();
}

function ensureDailyVisit(){
  const profile = loadLocalProfile();
  if(!profile) return;
  const ref = db.collection(COL_STUDENTS).doc(profile.studentId);
  ref.get().then(snap=>{
    if(!snap.exists) return;
    const s = snap.data();
    const today = todayStr();
    if(s.lastActiveDate === today) return; // already counted today
    const y = new Date(); y.setDate(y.getDate()-1);
    const yesterday = y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
    const newStreak = (s.lastActiveDate === yesterday) ? (s.streak||0)+1 : 1;
    const bonus = newStreak>=7 ? 12 : (newStreak>=3 ? 8 : POINTS_DAILY_BASE);
    const updated = Object.assign({}, s, { streak:newStreak, lastActiveDate:today, points:(s.points||0)+bonus });
    ref.update({ streak:newStreak, lastActiveDate:today, points:firebase.firestore.FieldValue.increment(bonus) })
      .then(()=>{ checkAndAwardBadges(profile.studentId, updated); toast('🔥 يوم جديد! +'+bonus+' نقطة (متتالية: '+newStreak+' يوم)','ok'); });
  }).catch(()=>{});
}

function checkAndAwardBadges(studentId, studentData){
  const have = new Set(studentData.badges||[]);
  const newlyEarned = BADGES.filter(b=>!have.has(b.id) && b.check(studentData));
  if(!newlyEarned.length) return;
  const allIds = (studentData.badges||[]).concat(newlyEarned.map(b=>b.id));
  db.collection(COL_STUDENTS).doc(studentId).update({ badges: allIds }).then(()=>{
    newlyEarned.forEach((b,i)=>{
      setTimeout(()=>toast('🎉 شارة جديدة: '+b.icon+' '+b.label, 'ok'), i*1600);
    });
  });
}

function awardHomeworkPoints(homeworkId){
  const profile = loadLocalProfile();
  if(!profile) return;
  const ref = db.collection(COL_STUDENTS).doc(profile.studentId);
  ref.get().then(snap=>{
    if(!snap.exists) return;
    const s = snap.data();
    const done = new Set(s.submittedHomeworkIds||[]);
    if(done.has(homeworkId)) return; // already rewarded for this specific homework
    const updatedIds = (s.submittedHomeworkIds||[]).concat([homeworkId]);
    const updated = Object.assign({}, s, {
      points:(s.points||0)+POINTS_PER_HOMEWORK,
      homeworkCount:(s.homeworkCount||0)+1,
      submittedHomeworkIds: updatedIds
    });
    ref.update({
      points: firebase.firestore.FieldValue.increment(POINTS_PER_HOMEWORK),
      homeworkCount: firebase.firestore.FieldValue.increment(1),
      submittedHomeworkIds: firebase.firestore.FieldValue.arrayUnion(homeworkId)
    }).then(()=>{
      toast('+' + POINTS_PER_HOMEWORK + ' نقطة على إرسال الواجب 🎉','ok');
      checkAndAwardBadges(profile.studentId, updated);
    });
  });
}

let _searchIndex = null;
let _searchIndexLoading = null;
let _searchDebounce = null;

function openSearch(){
  document.getElementById('modalRoot').innerHTML = `
  <div class="search-panel" onclick="if(event.target===this) closeSearch()">
    <div class="search-box">
      <div class="search-input-row">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="ابحث عن قانون، سؤال، مسألة، أو واجب..." autocomplete="off" oninput="onSearchInput()">
        <button onclick="closeSearch()">✕</button>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-hint">اكتب حرفين على الأقل للبحث في كل الصفوف والمواد.</div>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{ const inp = document.getElementById('searchInput'); if(inp) inp.focus(); }, 50);
}
function closeSearch(){ document.getElementById('modalRoot').innerHTML=''; }

function onSearchInput(){
  clearTimeout(_searchDebounce);
  const q = document.getElementById('searchInput').value.trim();
  if(q.length < 2){
    document.getElementById('searchResults').innerHTML = `<div class="search-hint">اكتب حرفين على الأقل للبحث في كل الصفوف والمواد.</div>`;
    return;
  }
  _searchDebounce = setTimeout(()=>runSearch(q), 280);
}

function loadSearchIndex(){
  if(_searchIndex) return Promise.resolve(_searchIndex);
  if(_searchIndexLoading) return _searchIndexLoading;
  const results = document.getElementById('searchResults');
  if(results) results.innerHTML = `<div class="loading"><div class="spin"></div>جارِ تجهيز فهرس البحث (أول مرة فقط)...</div>`;
  const sectionsToIndex = ['laws','problems','exams','homework'];
  _searchIndexLoading = Promise.all(sectionsToIndex.map(sec=>
    db.collectionGroup(sec).get().then(snap=>{
      const items = [];
      snap.forEach(doc=>{
        const parent = doc.ref.parent; // e.g. .../physics_grades/g1/laws
        const gradeRef = parent.parent; // .../physics_grades/g1
        if(!gradeRef || gradeRef.parent.id !== COL_GRADES) return;
        const d = doc.data();
        items.push({
          gradeId: gradeRef.id, section: sec, id: doc.id,
          title: d.title||'', content: d.content||'', formula: d.formula||''
        });
      });
      return items;
    }).catch(()=>[])
  )).then(arrays=>{
    _searchIndex = [].concat(...arrays);
    return _searchIndex;
  });
  return _searchIndexLoading;
}

function highlightMatch(text, q){
  if(!text) return '';
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1) return esc(text.slice(0,90));
  const start = Math.max(0, idx-30);
  const snippet = (start>0?'…':'') + text.slice(start, idx) + '[[MARK]]' + text.slice(idx, idx+q.length) + '[[/MARK]]' + text.slice(idx+q.length, idx+q.length+50);
  return esc(snippet).replace('[[MARK]]','<mark>').replace('[[/MARK]]','</mark>');
}

function runSearch(q){
  loadSearchIndex().then(index=>{
    const ql = q.toLowerCase();
    const matches = index.filter(item=>
      item.title.toLowerCase().includes(ql) ||
      item.content.toLowerCase().includes(ql) ||
      item.formula.toLowerCase().includes(ql)
    ).slice(0, 30);
    const results = document.getElementById('searchResults');
    if(!results) return;
    if(!matches.length){
      results.innerHTML = `<div class="search-hint">لا توجد نتائج مطابقة لـ «${esc(q)}».</div>`;
      return;
    }
    const secMeta = { laws:{icon:'⚖',label:'قانون'}, problems:{icon:'✎',label:'سؤال/مسألة'}, exams:{icon:'📜',label:'سؤال وزاري'}, homework:{icon:'📘',label:'واجب'} };
    results.innerHTML = matches.map((m,i)=>{
      const g = gradeById(m.gradeId);
      const meta = secMeta[m.section] || {icon:'📄',label:m.section};
      const snippetSrc = m.title.toLowerCase().includes(ql) ? m.content : (m.content.toLowerCase().includes(ql) ? m.content : m.formula);
      return `<button class="search-result-item" onclick="goToSearchResult(${i})">
        <div class="sr-meta">${meta.icon} ${meta.label} · ${g?esc(g.name):''}</div>
        <div class="sr-title">${highlightMatch(m.title, q)}</div>
        ${snippetSrc ? `<div class="sr-snippet">${highlightMatch(snippetSrc, q)}</div>` : ''}
      </button>`;
    }).join('');
    window._searchMatches = matches;
  });
}

function goToSearchResult(i){
  const m = window._searchMatches[i];
  if(!m) return;
  closeSearch();
  state.view = 'grade';
  state.gradeId = m.gradeId;
  state.tab = m.section;
  render();
}

document.addEventListener('keydown', function(e){
  if((e.ctrlKey||e.metaKey) && e.key==='k'){ e.preventDefault(); openSearch(); }
  if(e.key==='Escape'){ const sp=document.querySelector('.search-panel'); if(sp) closeSearch(); }
});

function renderChatBody(){
  const body = document.getElementById('chatBody');
  if(!body) return;
  body.innerHTML = window._chatHistory.map(h=>
    `<div class="chat-msg ${h.role==='user'?'user':'ai'}${h.error?' error':''}">${esc(h.text)}</div>`

// Fire-and-forget log of student questions to the AI tutor, used later to
// surface the platform's most common points of confusion to the teacher
// (see analytics tab). Never blocks or fails the chat flow.
function logAIQuestion(gradeId, question){
  try{
    db.collection(COL_AI_LOGS).add({
      gradeId: gradeId || null,
      question: question.slice(0, 500),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
  }catch(e){}
}

function sendTutorMessage(){
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatSendBtn');
  const text = input.value.trim();
  if(!text) return;
  window._chatHistory.push({ role:'user', text });
  input.value = '';
  btn.disabled = true;
  renderChatBody();
  logAIQuestion(state.gradeId, text);
  const body = document.getElementById('chatBody');
  body.insertAdjacentHTML('beforeend', `<div class="chat-typing" id="typingIndicator"><div class="spin" style="width:14px;height:14px;"></div>يفكر...</div>`);
  body.scrollTop = body.scrollHeight;

  const historyForApi = window._chatHistory.slice(0,-1).map(h=>({ role: h.role==='user'?'user':'model', text: h.text }));

  window.askPhysicsAI(text, historyForApi).then(reply=>{
    window._chatHistory.push({ role:'model', text: reply });
    btn.disabled = false;
    renderChatBody();
  }).catch(err=>{
    let msg = 'تعذّر الوصول للمساعد الذكي حالياً. حاول مرة ثانية بعد قليل.';
    if(err && err.message && err.message.indexOf('429') !== -1){
      msg = 'الخدمة مزدحمة حالياً (تجاوزنا الحد المجاني اليومي مؤقتاً). حاول بعد شوي.';
    }
    window._chatHistory.push({ role:'model', text: msg, error:true });
    btn.disabled = false;
    renderChatBody();
  });
}

function renderAnalyticsTab(list, aiLogs, homework, subs, students, selfChecks){
  // 1) Most common AI-tutor questions this grade's students are asking —
  // the clearest real signal of where students are actually struggling,
  // straight from their own words.
  const norm = s => (s||'').trim().replace(/\s+/g,' ').toLowerCase();
  const counts = {};
  aiLogs.forEach(l=>{ const k = norm(l.question); if(!k) return; counts[k] = counts[k] || { text: l.question.trim(), count:0 }; counts[k].count++; });
  const topQuestions = Object.values(counts).sort((a,b)=>b.count-a.count).slice(0,10);
  const recentQuestions = aiLogs.slice(0,15);

  // 2) Homework participation: submissions per homework vs total registered students
  const totalStudents = students.length;
  const subsByHw = {};
  subs.forEach(s=>{ subsByHw[s.homeworkId] = (subsByHw[s.homeworkId]||0) + 1; });
  const hwStats = homework.map(h=>({
    title: h.title || 'بدون عنوان',
    count: subsByHw[h.id] || 0,
    pct: totalStudents ? Math.round(((subsByHw[h.id]||0) / totalStudents) * 100) : 0
  })).sort((a,b)=>a.pct-b.pct);

  // 3) Students who may need attention: registered but with low points or a
  // broken streak (haven't engaged recently).
  const needsAttention = students.slice().sort((a,b)=>(a.points||0)-(b.points||0)).slice(0,10);

  // 4) Hardest questions: from self-check ratings students submit themselves
  // after trying to solve on their own — a direct, honest difficulty signal
  // (needs at least 2 responses per question to avoid noise from one click).
  const scStats = {};
  selfChecks.forEach(c=>{
    const k = c.itemId;
    scStats[k] = scStats[k] || { title: c.itemTitle, total:0, wrong:0 };
    scStats[k].total++;
    if(!c.correct) scStats[k].wrong++;
  });
  const hardestQuestions = Object.values(scStats)
    .filter(q=>q.total>=2)
    .map(q=>({ ...q, pct: Math.round((q.wrong/q.total)*100) }))
    .sort((a,b)=>b.pct-a.pct)
    .slice(0,10);

  list.innerHTML = `
  <div class="analytics-grid">
    <div class="analytics-card">
      <h4>🔥 أكثر الأسئلة تكراراً بالمساعد الذكي</h4>
      <p class="an-hint">أفضل مؤشر حقيقي على نقاط الضعف — بكلام الطلاب أنفسهم.</p>
      ${topQuestions.length ? topQuestions.map(q=>`
        <div class="an-row">
          <span class="an-count">${q.count}×</span>
          <span class="an-text">${esc(q.text)}</span>
        </div>`).join('') : '<div class="an-empty">لا توجد أسئلة مسجّلة بعد لهذا الصف.</div>'}
    </div>

    <div class="analytics-card">
      <h4>📉 أصعب الأسئلة (حسب تقييم الطلاب لأنفسهم)</h4>
      <p class="an-hint">أعلى نسبة "لا" من وضع "اختبر نفسك" بقسم الأسئلة.</p>
      ${hardestQuestions.length ? hardestQuestions.map(q=>`
        <div class="an-row">
          <span class="an-text">${esc(q.title)}</span>
          <span class="an-pct-wrap"><span class="an-pct-bar" style="width:${q.pct}%"></span></span>
          <span class="an-count">${q.pct}% (${q.wrong}/${q.total})</span>
        </div>`).join('') : '<div class="an-empty">لا توجد بيانات كافية بعد — الطلاب لم يستخدموا "اختبر نفسك" كفاية.</div>'}
    </div>

    <div class="analytics-card">
      <h4>📥 نسبة تسليم الواجبات</h4>
      <p class="an-hint">${totalStudents} طالب مسجّل بملفات شخصية بهذا الصف.</p>
      ${hwStats.length ? hwStats.map(h=>`
        <div class="an-row">
          <span class="an-text">${esc(h.title)}</span>
          <span class="an-pct-wrap"><span class="an-pct-bar" style="width:${h.pct}%"></span></span>
          <span class="an-count">${h.count}/${totalStudents||0}</span>
        </div>`).join('') : '<div class="an-empty">لا توجد واجبات مضافة لهذا الصف بعد.</div>'}
    </div>

    <div class="analytics-card">
      <h4>⚠ طلاب بحاجة لمتابعة</h4>
      <p class="an-hint">أقل الطلاب نقاطاً ضمن اللي أنشأوا ملفاً شخصياً.</p>
      ${needsAttention.length ? needsAttention.map(s=>`
        <div class="an-row">
          <span class="an-text">${esc(s.name)}</span>
          <span class="an-count">⭐ ${s.points||0} · 🔥 ${s.streak||0}</span>
        </div>`).join('') : '<div class="an-empty">لا يوجد طلاب مسجّلون بهذا الصف بعد.</div>'}
    </div>

    <div class="analytics-card">
      <h4>💬 آخر الأسئلة المطروحة</h4>
      ${recentQuestions.length ? recentQuestions.map(q=>`
        <div class="an-row"><span class="an-text">${esc(q.question)}</span></div>
      `).join('') : '<div class="an-empty">لا توجد أسئلة مسجّلة بعد.</div>'}
    </div>
  </div>`;
}

function saveSelectedGenerated(){

  const col = db.collection(COL_GRADES).doc(state.adminGrade).collection(state.adminSection);
  const batch = Array.from(checks).map(chk=>{

    return col.doc().set({

function toEmbedUrl(url){
  try{
    const u = new URL(url);
    if(u.hostname.includes('youtu.be')){
      return `https://www.youtube.com/embed/${u.pathname.slice(1)}`;
    }
    if(u.hostname.includes('youtube.com')){
      if(u.searchParams.get('v')) return `https://www.youtube.com/embed/${u.searchParams.get('v')}`;
      if(u.pathname.startsWith('/embed/')) return url;
    }
    return url;
  }catch(e){ return url; }
}

/* ================= FAVORITES (bookmark items for quick review) ================= */
function getFavorites(){
  try{ return JSON.parse(localStorage.getItem('physicsFavorites')||'{}'); }catch(e){ return {}; }
}
function isFavorite(itemId){ return !!getFavorites()[itemId]; }
function toggleFavorite(itemId){
  const favs = getFavorites();
  if(favs[itemId]) delete favs[itemId];
  else favs[itemId] = true;
  localStorage.setItem('physicsFavorites', JSON.stringify(favs));
  // Re-render so the "favorites only" filter and its counter (scoped to the
  // items actually shown in this section) both stay correct — computing the
  // counter from localStorage alone would wrongly include other sections.
  loadItems(state.gradeId, state.tab);
}
function toggleFavoritesFilter(){
  state.favoritesOnly = !state.favoritesOnly;
  loadItems(state.gradeId, state.tab);
}

function loadItems(gradeId, section){
  db.collection(COL_GRADES).doc(gradeId).collection(section).orderBy('createdAt','asc').get()
  .then(snap=>{
    const list = document.getElementById('itemList');
    if(!list) return;
    const favs = getFavorites();
    let docs = [];
    snap.forEach(doc=>docs.push(doc));
    const favCount = docs.filter(doc=>favs[doc.id]).length;
    if(state.favoritesOnly) docs = docs.filter(doc=>favs[doc.id]);

    const filterBar = `<div class="fav-filter-bar no-print">
      <button class="btn btn-sm ${state.favoritesOnly?'btn-yellow':'btn-outline'}" onclick="toggleFavoritesFilter()">
        ⭐ ${state.favoritesOnly ? 'عرض الكل' : 'عرض المفضلة فقط'} (${favCount})
      </button>
    </div>`;

    if(!docs.length){
      const meta = SECTIONS.find(s=>s.id===section);
      const msg = state.favoritesOnly ? 'لم تُضِف أي عنصر إلى المفضلة بعد بهذا القسم — اضغط ⭐ على أي عنصر لحفظه هنا.' : meta.empty;
      list.innerHTML = filterBar + `<div class="empty-state"><b>لا يوجد محتوى</b>${msg}</div>`;
      return;
    }
    const selfCheckSection = (section==='problems' || section==='exams');
    let html = filterBar;
    docs.forEach(doc=>{
      const d = doc.data();
      const favActive = favs[doc.id] ? 'active' : '';
      const starBtn = `<button class="fav-star ${favActive}" id="fav-${doc.id}" onclick="toggleFavorite('${doc.id}')" title="إضافة للمفضلة">★</button>`;
      const answerBlock = `
        <div class="item-body">${esc(d.content||'')}</div>
        ${d.formula? `<div class="item-formula">${esc(d.formula)}</div>` : ''}
        ${d.videoUrl? `<div class="item-video"><iframe src="${esc(toEmbedUrl(d.videoUrl))}" allowfullscreen loading="lazy"></iframe></div>` : ''}`;

      if(selfCheckSection){
        const titleJson = esc(JSON.stringify(d.title||''));
        html += `<div class="item-card">
          <div class="item-title-row">
            <div class="item-title">${esc(d.title)}</div>
            ${starBtn}
          </div>
          <div id="sc-reveal-${doc.id}">
            <button class="btn btn-outline" onclick="revealAnswer('${doc.id}')">🔍 حاول تحلّه أولاً ثم اضغط لعرض الحل</button>
          </div>
          <div id="sc-answer-${doc.id}" style="display:none;">
            ${answerBlock}
            <div class="self-rate-row" id="sc-rate-${doc.id}">
              <span>هل توصّلت للحل صح بنفسك؟</span>
              <button class="btn btn-sm btn-outline" onclick='submitSelfCheck("${gradeId}","${section}","${doc.id}",${titleJson},true)'>✅ نعم</button>
              <button class="btn btn-sm btn-outline" onclick='submitSelfCheck("${gradeId}","${section}","${doc.id}",${titleJson},false)'>❌ لا</button>
            </div>
          </div>
        </div>`;
      } else {
        html += `<div class="item-card">
          <div class="item-title-row">
            <div class="item-title">${esc(d.title)}</div>
            ${starBtn}
          </div>
          ${answerBlock}
          ${section==='homework' ? `<div class="hw-actions"><button class="btn btn-blue" onclick="openUploadModal('${gradeId}','${doc.id}',${JSON.stringify(d.title||'')})">📤 رفع الواجب</button></div>` : ''}
        </div>`;
      }
    });
    list.innerHTML = html;
  })
  .catch(err=>{
    const list = document.getElementById('itemList');
    if(list) list.innerHTML = `<div class="empty-state"><b>تعذّر تحميل البيانات</b>${esc(err.message)}</div>`;
  });
}

function revealAnswer(itemId){
  const revealBtn = document.getElementById('sc-reveal-'+itemId);
  const answer = document.getElementById('sc-answer-'+itemId);
  if(revealBtn) revealBtn.style.display = 'none';
  if(answer) answer.style.display = 'block';
}

function submitSelfCheck(gradeId, section, itemId, itemTitle, correct){
  const rateRow = document.getElementById('sc-rate-'+itemId);
  if(rateRow) rateRow.innerHTML = correct ? 'أحسنت! سجّلنا إجابتك ✓' : 'لا بأس، راجع الحل جيداً وحاول مرة أخرى لاحقاً ✓';

  // Log for teacher analytics (which questions students struggle with most)
  try{
    db.collection(COL_SELF_CHECKS).add({
      gradeId, section, itemId, itemTitle: (itemTitle||'').slice(0,300), correct: !!correct,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
  }catch(e){}

  // Small point reward for genuinely engaging (attempting + checking), same
  // reward whether right or wrong, so it never incentivizes dishonest self-rating.
  const profile = loadLocalProfile();
  if(!profile) return;
  const ref = db.collection(COL_STUDENTS).doc(profile.studentId);
  ref.get().then(snap=>{
    if(!snap.exists) return;
    const s = snap.data();
    const done = new Set(s.selfCheckedIds||[]);
    if(done.has(itemId)) return; // already rewarded for this specific question
    return ref.update({
      points: firebase.firestore.FieldValue.increment(2),
      selfCheckedIds: firebase.firestore.FieldValue.arrayUnion(itemId)
    });
  }).then(()=>renderStudentBar()).catch(()=>{});
}

function initPendulumActivity(card){
  card.innerHTML = `
    <h4>🕰 مختبر البندول البسيط</h4>
    <div class="activity-note">نموذج تكاملي عددي لمعادلة الحركة الفعلية للبندول (θ'' = -(g/L)sinθ)، وليس تقريبًا مبسطًا للزاوية الصغيرة فقط — لذلك تلاحظ فرقاً في الزمن الدوري عند الزوايا الكبيرة.</div>
    <canvas width="300" height="280"></canvas>
    <div class="activity-controls">
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">طول الخيط (L)</span><span class="slider-value pendLenVal">1.00 م</span></div>
        <input type="range" min="0.2" max="2" step="0.05" value="1" class="pendLength">
      </div>
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">زاوية الانطلاق (θ₀)</span><span class="slider-value pendAngVal">35°</span></div>
        <input type="range" min="5" max="80" step="1" value="35" class="pendAngle">
      </div>
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">الجاذبية (g)</span><span class="slider-value pendGVal">9.8 م/ث²</span></div>
        <input type="range" min="1" max="20" step="0.5" value="9.8" class="pendG">
      </div>
      <div class="formula-panel pendFormula"></div>
      <button class="btn btn-yellow pendToggle">إيقاف</button>
    </div>`;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const lenInput = card.querySelector('.pendLength');
  const angInput = card.querySelector('.pendAngle');
  const gInput = card.querySelector('.pendG');
  const lenVal = card.querySelector('.pendLenVal');
  const angVal = card.querySelector('.pendAngVal');
  const gVal = card.querySelector('.pendGVal');
  const formulaEl = card.querySelector('.pendFormula');
  const toggleBtn = card.querySelector('.pendToggle');
  let theta, omega, running = true, lastTs = null;

  function resetState(){
    theta = parseFloat(angInput.value) * Math.PI/180;
    omega = 0;
  }
  function updateReadouts(){
    lenVal.textContent = parseFloat(lenInput.value).toFixed(2) + ' م';
    angVal.textContent = angInput.value + '°';
    gVal.textContent = parseFloat(gInput.value).toFixed(1) + ' م/ث²';
    const L = parseFloat(lenInput.value), g = parseFloat(gInput.value);
    const Tsmall = 2*Math.PI*Math.sqrt(L/g);
    formulaEl.innerHTML = `T = 2π√(L/g) → T ≈ ${Tsmall.toFixed(2)} s<small>(الصيغة أعلاه تقريب للزوايا الصغيرة فقط؛ الحركة المرسومة فعلياً محسوبة عددياً)</small>`;
  }
  resetState();
  updateReadouts();

  function draw(ts){
    if(!lastTs) lastTs = ts;
    let dt = (ts-lastTs)/1000; lastTs = ts;
    dt = Math.min(dt, 0.05);
    const L = parseFloat(lenInput.value), g = parseFloat(gInput.value);
    if(running){
      const steps = 4;
      const h = dt/steps;
      for(let i=0;i<steps;i++){
        const alpha = -(g/L)*Math.sin(theta);
        omega += alpha*h;
        theta += omega*h;
      }
    }
    const pivotX = 150, pivotY = 30;
    const armLen = 90 + (L-0.2)*70;
    const bobX = pivotX + armLen*Math.sin(theta);
    const bobY = pivotY + armLen*Math.cos(theta);
    ctx.clearRect(0,0,300,280);
    ctx.strokeStyle = '#3D5344'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pivotX-40,pivotY); ctx.lineTo(pivotX+40,pivotY); ctx.stroke();
    ctx.strokeStyle = '#F3EFE2'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(bobX,bobY); ctx.stroke();
    ctx.fillStyle = '#F0CE6E';
    ctx.beginPath(); ctx.arc(bobX,bobY,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8FBFCB';
    ctx.beginPath(); ctx.arc(pivotX,pivotY,4,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(draw);
  }
  lenInput.addEventListener('input', ()=>{ updateReadouts(); });
  gInput.addEventListener('input', ()=>{ updateReadouts(); });
  angInput.addEventListener('input', ()=>{ updateReadouts(); resetState(); });
  toggleBtn.addEventListener('click', ()=>{ running = !running; toggleBtn.textContent = running?'إيقاف':'تشغيل'; });
  requestAnimationFrame(draw);
}

function initFreefallActivity(card){
  card.innerHTML = `
    <h4>⬇ مختبر السقوط الحر</h4>
    <div class="activity-note">يُهمل النموذج مقاومة الهواء ويفترض تسارعاً ثابتاً نحو الأسفل طوال مسار السقوط.</div>
    <canvas width="180" height="300"></canvas>
    <div class="activity-controls">
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">ارتفاع السقوط (h)</span><span class="slider-value ffHVal">20 م</span></div>
        <input type="range" min="1" max="50" step="1" value="20" class="ffHeight">
      </div>
      <div class="formula-panel ffFormula"></div>
      <button class="btn btn-yellow ffDrop">إسقاط الكرة</button>
    </div>`;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const hInput = card.querySelector('.ffHeight');
  const hVal = card.querySelector('.ffHVal');
  const formulaEl = card.querySelector('.ffFormula');
  const dropBtn = card.querySelector('.ffDrop');
  const g = 9.8;
  let falling = false, t = 0, lastTs = null;
  function totalTime(h){ return Math.sqrt(2*h/g); }
  function updateStatic(){
    hVal.textContent = hInput.value + ' م';
  }
  function draw(ts){
    if(!lastTs) lastTs = ts;
    const dt = (ts-lastTs)/1000; lastTs = ts;
    const h = parseFloat(hInput.value);
    const tmax = totalTime(h);
    if(falling){ t += dt; if(t >= tmax){ t = tmax; falling = false; } }
    const fallenDist = 0.5*g*t*t;
    const frac = Math.min(fallenDist/h, 1);
    const groundY = 280, topY = 20;
    const ballY = topY + frac*(groundY-topY);
    ctx.clearRect(0,0,180,300);
    ctx.strokeStyle = '#3D5344';
    ctx.setLineDash([4,5]);
    ctx.beginPath(); ctx.moveTo(30,topY); ctx.lineTo(30,groundY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#547059';
    ctx.fillRect(10, groundY, 160, 6);
    ctx.fillStyle = '#E58F76';
    ctx.beginPath(); ctx.arc(90, ballY, 12, 0, Math.PI*2); ctx.fill();
    const v = g*t;
    formulaEl.innerHTML = `t = ${t.toFixed(2)} s &nbsp; v = ${v.toFixed(1)} m/s<small>الزمن الكلي المتوقع للوصول: ${tmax.toFixed(2)} ثانية</small>`;
    requestAnimationFrame(draw);
  }
  dropBtn.addEventListener('click', ()=>{ t = 0; falling = true; });
  hInput.addEventListener('input', ()=>{ updateStatic(); if(!falling){ t = 0; } });
  updateStatic();
  requestAnimationFrame(draw);
}


function initInclineActivity(card){
  card.innerHTML = `
    <h4>📐 مختبر الحركة على مستوى مائل</h4>
    <div class="activity-note">يُهمل النموذج مقاومة الهواء، ويحسب التسارع باستخدام محصلة الجاذبية والاحتكاك على المستوى المائل.</div>
    <canvas width="300" height="260"></canvas>
    <div class="activity-controls">
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">زاوية الميل (θ)</span><span class="slider-value incAngVal">30°</span></div>
        <input type="range" min="5" max="60" step="1" value="30" class="incAngle">
      </div>
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">معامل الاحتكاك (μ)</span><span class="slider-value incMuVal">0.10</span></div>
        <input type="range" min="0" max="0.5" step="0.02" value="0.1" class="incMu">
      </div>
      <div class="formula-panel incFormula"></div>
      <button class="btn btn-yellow incStart">ابدأ الانزلاق</button>
    </div>`;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const angInput = card.querySelector('.incAngle');
  const muInput = card.querySelector('.incMu');
  const angVal = card.querySelector('.incAngVal');
  const muVal = card.querySelector('.incMuVal');
  const formulaEl = card.querySelector('.incFormula');
  const startBtn = card.querySelector('.incStart');
  const g = 9.8;
  let sliding = false, dist = 0, vel = 0, t = 0, lastTs = null;
  const rampLen = 220;

  function accel(){
    const th = parseFloat(angInput.value) * Math.PI/180;
    const mu = parseFloat(muInput.value);
    return g*(Math.sin(th) - mu*Math.cos(th));
  }
  function updateReadouts(){
    angVal.textContent = angInput.value + '°';
    muVal.textContent = parseFloat(muInput.value).toFixed(2);
    const a = accel();
    formulaEl.innerHTML = `a = g(sinθ − μcosθ) → a ≈ ${a.toFixed(2)} m/s²<small>${a<=0? 'الاحتكاك أكبر من مركّبة الجاذبية؛ الجسم لن ينزلق.' : 'الجسم سينزلق للأسفل بهذا التسارع.'}</small>`;
  }
  updateReadouts();

  function draw(ts){
    if(!lastTs) lastTs = ts;
    let dt = (ts-lastTs)/1000; lastTs = ts;
    dt = Math.min(dt, 0.05);
    const th = parseFloat(angInput.value) * Math.PI/180;
    const a = accel();
    if(sliding && a > 0){
      vel += a*dt; dist += vel*dt; t += dt;
      if(dist >= rampLen){ dist = rampLen; sliding = false; }
    }
    ctx.clearRect(0,0,300,260);
    const baseX = 30, baseY = 230;
    const topX = baseX + rampLen*Math.cos(th);
    const topY = baseY - rampLen*Math.sin(th);
    ctx.strokeStyle = '#547059'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(baseX,baseY); ctx.lineTo(270,baseY); ctx.stroke();
    ctx.strokeStyle = '#F3EFE2'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(baseX,baseY); ctx.lineTo(topX,topY); ctx.stroke();
    const bx = topX - dist*Math.cos(th);
    const by = topY + dist*Math.sin(th);
    ctx.save();
    ctx.translate(bx,by); ctx.rotate(-th);
    ctx.fillStyle = '#F0CE6E';
    ctx.fillRect(-11,-11,22,22);
    ctx.restore();
    requestAnimationFrame(draw);
  }
  startBtn.addEventListener('click', ()=>{ dist=0; vel=0; t=0; sliding = accel() > 0; if(!sliding) toast('التسارع سالب أو صفر — الجسم لن ينزلق بهذه القيم','err'); });
  angInput.addEventListener('input', ()=>{ updateReadouts(); });
  muInput.addEventListener('input', ()=>{ updateReadouts(); });
  requestAnimationFrame(draw);
}

/* ---- Boyle's Law: draggable piston ---- */
function initBoyleActivity(card){
  card.innerHTML = `
    <h4>🧴 قانون بويل — اسحب المكبس</h4>
    <div class="activity-note">اسحب المكبس (المقبض الرمادي) للأعلى أو الأسفل لتغيير حجم الغاز، ولاحظ كيف يتغير الضغط عكسياً معه عند ثبوت درجة الحرارة وكمية الغاز.</div>
    <div style="position:relative; width:220px; height:290px; margin:0 auto; touch-action:none;" class="boyleWrap">
      <canvas width="220" height="290"></canvas>
      <div class="piston-handle" style="top:40px;"></div>
    </div>
    <div class="formula-panel boyleFormula" style="max-width:320px; margin:14px auto 0;"></div>`;
  const wrap = card.querySelector('.boyleWrap');
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const piston = card.querySelector('.piston-handle');
  const formulaEl = card.querySelector('.boyleFormula');
  const cylLeft = 40, cylRight = 180, cylBottom = 270, minTop = 30, maxTop = 220;
  let pistonTop = 40;
  const N = 14;
  const particles = Array.from({length:N}, ()=>({
    x: cylLeft+15+Math.random()*(cylRight-cylLeft-30),
    y: pistonTop+30+Math.random()*(cylBottom-pistonTop-30),
    vx:(Math.random()-0.5)*90, vy:(Math.random()-0.5)*90
  }));

  function volumeFrac(){ return Math.max(0.12, (maxTop-pistonTop)/(maxTop-minTop)); }
  function pressure(){ return (1/volumeFrac()).toFixed(2); }
  function updateFormula(){
    formulaEl.innerHTML = `P × V = ثابت<br>الحجم النسبي V ≈ ${volumeFrac().toFixed(2)} &nbsp;|&nbsp; الضغط النسبي P ≈ ${pressure()} atm<small>كلما صغُر الحجم (سحبت المكبس للأسفل) ارتفع الضغط، والعكس صحيح.</small>`;
  }
  function setPistonTop(v){
    pistonTop = Math.min(maxTop, Math.max(minTop, v));
    piston.style.top = pistonTop + 'px';
    updateFormula();
  }
  setPistonTop(40);

  let dragging = false, startY=0, startTop=0;
  function pointerDown(e){ dragging=true; startY = (e.touches? e.touches[0].clientY : e.clientY); startTop = pistonTop; piston.setPointerCapture && e.pointerId!==undefined && piston.setPointerCapture(e.pointerId); }
  function pointerMove(e){
    if(!dragging) return;
    const clientY = e.touches? e.touches[0].clientY : e.clientY;
    setPistonTop(startTop + (clientY-startY));
  }
  function pointerUp(){ dragging=false; }
  piston.addEventListener('pointerdown', pointerDown);
  window.addEventListener('pointermove', pointerMove);
  window.addEventListener('pointerup', pointerUp);

  let lastTs=null;
  function draw(ts){
    if(!lastTs) lastTs=ts;
    let dt=(ts-lastTs)/1000; lastTs=ts; dt=Math.min(dt,0.05);
    const top = pistonTop+18, bottom = cylBottom;
    particles.forEach(p=>{
      p.x += p.vx*dt; p.y += p.vy*dt;
      if(p.x < cylLeft+10 || p.x > cylRight-10) p.vx *= -1;
      if(p.y < top+6) { p.y = top+6; p.vy *= -1; }
      if(p.y > bottom-8) { p.y = bottom-8; p.vy *= -1; }
      p.x = Math.max(cylLeft+10, Math.min(cylRight-10, p.x));
    });
    ctx.clearRect(0,0,220,290);
    ctx.strokeStyle = '#547059'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cylLeft,20); ctx.lineTo(cylLeft,cylBottom); ctx.lineTo(cylRight,cylBottom); ctx.lineTo(cylRight,20); ctx.stroke();
    ctx.fillStyle = '#F0CE6E';
    particles.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ---- Volume by displacement: drag rock into cylinder ---- */
function initDisplacementActivity(card){
  card.innerHTML = `
    <h4>🪨 قياس حجم جسم بالإزاحة</h4>
    <div class="activity-note">اسحب الحجر إلى داخل المخبار المدرّج ولاحظ ارتفاع مستوى الماء. الفرق بين قراءة المستوى قبل وبعد يساوي حجم الجسم.</div>
    <div style="position:relative; width:240px; height:300px; margin:0 auto; touch-action:none;" class="dispWrap">
      <canvas width="240" height="300"></canvas>
      <div class="drag-rock" style="left:8px; top:230px;">🪨</div>
    </div>
    <div class="drag-hint">اسحب الحجر بإصبعك أو الفأرة إلى داخل المخبار</div>
    <div class="formula-panel dispFormula" style="max-width:320px; margin:14px auto 0;"></div>
    <button class="btn btn-outline dispReset" style="margin-top:10px;">إعادة الضبط</button>`;
  const wrap = card.querySelector('.dispWrap');
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const rock = card.querySelector('.drag-rock');
  const formulaEl = card.querySelector('.dispFormula');
  const resetBtn = card.querySelector('.dispReset');

  const cylLeft=90, cylRight=190, cylBottom=280, cylTop=40;
  const V1=100, deltaV=45;
  const restLeft=8, restTop=230;
  let waterLevelY, targetWaterLevelY, dropped=false;

  function levelYForVolume(vol){
    // scale: 0 (cylTop) .. maxVolCapacity(cylBottom) roughly 0-300cm3 across height
    const maxVol=300;
    const frac = vol/maxVol;
    return cylBottom - frac*(cylBottom-cylTop);
  }
  function resetState(){
    dropped=false;
    waterLevelY = levelYForVolume(V1);
    targetWaterLevelY = waterLevelY;
    rock.style.left = restLeft+'px'; rock.style.top = restTop+'px';
    formulaEl.innerHTML = `V₁ = ${V1} سم³ (المستوى الابتدائي)<small>اسحب الحجر إلى داخل الماء لقياس حجمه.</small>`;
  }
  resetState();

  function drawCylinder(){
    ctx.clearRect(0,0,240,300);
    ctx.fillStyle = 'rgba(143,191,203,.35)';
    ctx.fillRect(cylLeft+3, waterLevelY, cylRight-cylLeft-6, cylBottom-waterLevelY);
    ctx.strokeStyle = '#8FBFCB'; ctx.lineWidth=2;
    ctx.strokeRect(cylLeft, cylTop, cylRight-cylLeft, cylBottom-cylTop);
    ctx.strokeStyle = '#547059'; ctx.lineWidth=1;
    for(let i=1;i<10;i++){
      const y = cylTop + i*(cylBottom-cylTop)/10;
      ctx.beginPath(); ctx.moveTo(cylLeft, y); ctx.lineTo(cylLeft+8, y); ctx.stroke();
    }
    if(dropped){
      ctx.fillStyle = '#3D5344';
      ctx.beginPath(); ctx.arc((cylLeft+cylRight)/2, cylBottom-16, 14, 0, Math.PI*2); ctx.fill();
    }
  }
  let lastTs=null;
  function animate(ts){
    if(!lastTs) lastTs=ts;
    const dt=(ts-lastTs)/1000; lastTs=ts;
    waterLevelY += (targetWaterLevelY-waterLevelY)*Math.min(1, dt*4);
    drawCylinder();
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  let dragging=false, offX=0, offY=0;
  function toWrapCoords(e){
    const r = wrap.getBoundingClientRect();
    const clientX = e.touches? e.touches[0].clientX : e.clientX;
    const clientY = e.touches? e.touches[0].clientY : e.clientY;
    return { x: clientX-r.left, y: clientY-r.top };
  }
  function pointerDown(e){
    if(dropped) return;
    dragging=true;
    const p = toWrapCoords(e);
    offX = p.x - rock.offsetLeft; offY = p.y - rock.offsetTop;
  }
  function pointerMove(e){
    if(!dragging) return;
    const p = toWrapCoords(e);
    rock.style.left = (p.x-offX)+'px';
    rock.style.top = (p.y-offY)+'px';
  }
  function pointerUp(){
    if(!dragging) return;
    dragging=false;
    const rx = rock.offsetLeft+18, ry = rock.offsetTop+18;
    if(rx>cylLeft && rx<cylRight && ry>cylTop && ry<cylBottom && !dropped){
      dropped = true;
      rock.style.left = ((cylLeft+cylRight)/2-18)+'px';
      rock.style.top = (cylBottom-30)+'px';
      targetWaterLevelY = levelYForVolume(V1+deltaV);
      formulaEl.innerHTML = `V₁ = ${V1} سم³ &nbsp; V₂ = ${V1+deltaV} سم³<br>حجم الجسم = V₂ − V₁ = ${deltaV} سم³<small>لاحظ ارتفاع مستوى الماء بعد غمر الحجر.</small>`;
    } else {
      rock.style.left = restLeft+'px'; rock.style.top = restTop+'px';
    }
  }
  rock.addEventListener('pointerdown', pointerDown);
  window.addEventListener('pointermove', pointerMove);
  window.addEventListener('pointerup', pointerUp);
  resetBtn.addEventListener('click', resetState);
}

/* ---- Archimedes' principle: floating/sinking object ---- */
function initArchimedesActivity(card){
  card.innerHTML = `
    <h4>🛟 مبدأ أرخميدس — الطفو والغرق</h4>
    <div class="activity-note">غيّر كثافة الجسم ولاحظ أي جزء منه يبقى مغموراً في الماء بحيث تتوازن قوة الطفو مع وزن الجسم.</div>

      <div class="slider-row">

  function updateReadouts(){
    rhoVal.textContent = rhoInput.value + ' kg/m³';
    const f = submergedFrac();
    const state = parseFloat(rhoInput.value) >= rhoWater ? 'يغرق الجسم بالكامل لأن كثافته أكبر من أو تساوي كثافة الماء.' : 'يطفو الجسم مع غمر جزء منه بنسبة ' + (f*100).toFixed(0) + '% من حجمه.';
    formulaEl.innerHTML = `الجزء المغمور = ρ_جسم / ρ_الماء ≈ ${(f*100).toFixed(0)}%<br>Fb = ρ_الماء × V_مغمور × g<small>${state}</small>`;
  }
  function draw(){
    ctx.clearRect(0,0,220,260);
    ctx.fillStyle = 'rgba(143,191,203,.3)';

    ctx.strokeStyle = '#8FBFCB'; ctx.lineWidth=2;
    ctx.strokeRect(containerLeft, 20, containerRight-containerLeft, containerBottom-20);
    const f = submergedFrac();
    const submergedH = boxSize*f;
    const boxTopY = waterY - (boxSize-submergedH);
    const boxX = (containerLeft+containerRight)/2 - boxSize/2;
    ctx.fillStyle = '#E58F76';
    ctx.fillRect(boxX, boxTopY, boxSize, boxSize);
    ctx.strokeStyle = '#3D5344'; ctx.lineWidth=1.5;
    ctx.strokeRect(boxX, boxTopY, boxSize, boxSize);
  }
  rhoInput.addEventListener('input', ()=>{ updateReadouts(); draw(); });
  updateReadouts();
  draw();
}

/* ---- Lever / torque balance: drag the weight along the beam ---- */
function initLeverActivity(card){
  card.innerHTML = `
    <h4>⚖️ الرافعة وموازنة العزم</h4>
    <div class="activity-note">اسحب الثقل الأصفر يميناً ويساراً على الرافعة حتى تتوازن مع الثقل الثابت في الطرف الآخر، حسب قانون العزم τ = F × d.</div>
    <div style="position:relative; width:280px; height:200px; margin:0 auto; touch-action:none;" class="leverWrap">
      <canvas width="280" height="200"></canvas>
      <div class="drag-rock leverWeight" style="left:210px; top:70px; font-size:30px;">🟡</div>
    </div>
    <div class="activity-controls">
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">الثقل الثابت (يسار)</span><span class="slider-value leverFixedVal">40 N</span></div>
        <input type="range" min="10" max="80" step="5" value="40" class="leverFixed">
      </div>
      <div class="formula-panel leverFormula"></div>
    </div>`;
  const wrap = card.querySelector('.leverWrap');
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const weightEl = card.querySelector('.leverWeight');
  const fixedInput = card.querySelector('.leverFixed');
  const fixedVal = card.querySelector('.leverFixedVal');
  const formulaEl = card.querySelector('.leverFormula');

  const pivotX = 140, beamY = 100, beamHalf = 120;
  const movableForce = 30; // fixed weight value of the draggable mass (N)
  let weightX = 210; // px position of draggable weight center

  function distFromPivot(px){ return (px - pivotX) / 4; } // px to arbitrary "meters" scale
  function computeTorques(){
    const dFixed = beamHalf/4;
    const fixedForce = parseFloat(fixedInput.value);
    const tFixed = fixedForce * dFixed;
    const dMovable = Math.abs(distFromPivot(weightX));
    const tMovable = movableForce * dMovable;
    return { tFixed, tMovable, fixedForce, dFixed, dMovable };
  }
  function updateReadouts(){
    fixedVal.textContent = fixedInput.value + ' N';
    const { tFixed, tMovable } = computeTorques();
    const diff = Math.abs(tFixed - tMovable);
    const balanced = diff < 1.5;
    formulaEl.innerHTML = `τ = F × d<br>عزم اليسار ≈ ${tFixed.toFixed(1)} &nbsp;|&nbsp; عزم اليمين ≈ ${tMovable.toFixed(1)}<small>${balanced ? '✅ الرافعة متوازنة الآن!' : 'حرّك الثقل حتى يتساوى العزمان.'}</small>`;
  }
  function draw(){
    const { tFixed, tMovable } = computeTorques();
    const balance = tFixed - tMovable; // >0 tilts left(down), <0 tilts right(down)
    const tilt = Math.max(-12, Math.min(12, balance*0.9));
    ctx.clearRect(0,0,280,200);
    ctx.save();
    ctx.translate(pivotX, beamY);
    ctx.rotate(tilt*Math.PI/180);
    ctx.strokeStyle = '#F3EFE2'; ctx.lineWidth=8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-beamHalf,0); ctx.lineTo(beamHalf,0); ctx.stroke();
    ctx.fillStyle = '#E58F76';
    ctx.fillRect(-beamHalf-8, -14, 16, 28);
    ctx.restore();
    ctx.fillStyle = '#547059';
    ctx.beginPath(); ctx.moveTo(pivotX-16,beamY+40); ctx.lineTo(pivotX+16,beamY+40); ctx.lineTo(pivotX,beamY+14); ctx.closePath(); ctx.fill();
  }
  let dragging=false, offX=0;
  function toWrapX(e){ const r = wrap.getBoundingClientRect(); const cx = e.touches? e.touches[0].clientX : e.clientX; return cx-r.left; }
  weightEl.addEventListener('pointerdown', e=>{ dragging=true; offX = toWrapX(e)-weightEl.offsetLeft; });
  window.addEventListener('pointermove', e=>{
    if(!dragging) return;
    let x = toWrapX(e)-offX;
    x = Math.max(pivotX-beamHalf-10, Math.min(beamHalf+pivotX-10-30, x));
    weightEl.style.left = x+'px';
    weightX = x+18;
    updateReadouts(); draw();
  });
  window.addEventListener('pointerup', ()=>{ dragging=false; });
  updateReadouts();
  draw();
}

function initProjectileActivity(card){

    <h4>🎯 حركة القذيفة (رمي مائل)</h4>

      </div>

        <input type="range" min="10" max="80" step="1" value="45" class="projAng">
      </div>
      <div class="formula-panel projFormula"></div>
      <button class="btn btn-yellow projLaunch">إطلاق</button>
    </div>`;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const vInput = card.querySelector('.projV');
  const angInput = card.querySelector('.projAng');
  const vVal = card.querySelector('.projVVal');
  const angVal = card.querySelector('.projAngVal');
  const formulaEl = card.querySelector('.projFormula');
  const launchBtn = card.querySelector('.projLaunch');
  const g = 9.8;
  const groundY = 200, originX = 20, scale = 6;
  let flying=false, t=0, lastTs=null;

  function range(){
    const v0 = parseFloat(vInput.value), th = parseFloat(angInput.value)*Math.PI/180;
    return (v0*v0*Math.sin(2*th))/g;
  }
  function updateReadouts(){
    vVal.textContent = vInput.value + ' m/s';
    angVal.textContent = angInput.value + '°';
    formulaEl.innerHTML = `R = v₀² sin(2θ) / g<br>المدى الأفقي المتوقع ≈ ${range().toFixed(1)} م`;
  }
  function draw(){
    ctx.clearRect(0,0,300,220);
    ctx.strokeStyle = '#547059';
    ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(300,groundY); ctx.stroke();
    const v0 = parseFloat(vInput.value), th = parseFloat(angInput.value)*Math.PI/180;
    ctx.strokeStyle = '#F0CE6E'; ctx.lineWidth=2; ctx.beginPath();
    let first=true;
    for(let tt=0; tt<=t; tt+=0.02){
      const x = originX + v0*Math.cos(th)*tt*scale;
      const y = groundY - (v0*Math.sin(th)*tt - 0.5*g*tt*tt)*scale;
      if(y>groundY) break;
      if(first){ ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
    }
    ctx.stroke();
    const x = originX + v0*Math.cos(th)*t*scale;
    const y = groundY - (v0*Math.sin(th)*t - 0.5*g*t*t)*scale;
    if(y<=groundY){
      ctx.fillStyle = '#E58F76';
      ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(anim);
  }
  function anim(ts){
    if(!lastTs) lastTs=ts;
    const dt=(ts-lastTs)/1000; lastTs=ts;
    if(flying){
      t += dt;
      const v0 = parseFloat(vInput.value), th = parseFloat(angInput.value)*Math.PI/180;
      const y = v0*Math.sin(th)*t - 0.5*g*t*t;
      if(y < 0){ flying=false; t = (2*v0*Math.sin(th))/g; }
    }
    draw();
  }
  launchBtn.addEventListener('click', ()=>{ t=0; flying=true; });
  vInput.addEventListener('input', ()=>{ updateReadouts(); if(!flying) draw(); });
  angInput.addEventListener('input', ()=>{ updateReadouts(); if(!flying) draw(); });
  updateReadouts();
  requestAnimationFrame(anim);
}

  const formulaEl = card.querySelector('.colFormula');
  const runBtn = card.querySelector('.colRun');
  let x1 = 20, x2 = 220, running = false, collided = false, vFinal = 0, v1cur = 0;

  function updateReadouts(){
    m1V.textContent = m1I.value + ' kg';
    v1V.textContent = v1I.value + ' م/ث';
    m2V.textContent = m2I.value + ' kg';
    const m1=+m1I.value, v1=+v1I.value, m2=+m2I.value;
    const pBefore = m1*v1;
    const vf = pBefore/(m1+m2);
    formulaEl.innerHTML = `m₁v₁ = (m₁+m₂)v_نهائية<br>الزخم قبل ≈ ${pBefore.toFixed(1)} kg·m/s &nbsp;|&nbsp; السرعة النهائية ≈ ${vf.toFixed(2)} م/ث<small>الزخم بعد التصادم = ${(( m1+m2)*vf).toFixed(1)} kg·m/s (محفوظ)</small>`;
  }
  function resetPositions(){ x1=20; x2=220; collided=false; running=false; }
  function draw(ts){
    ctx.clearRect(0,0,300,120);
    ctx.strokeStyle='#547059'; ctx.beginPath(); ctx.moveTo(0,100); ctx.lineTo(300,100); ctx.stroke();
    const m1=+m1I.value, m2=+m2I.value;
    const r1 = 10+m1*1.5, r2 = 10+m2*1.5;
    if(running && !collided){
      v1cur = +v1I.value;
      x1 += v1cur*0.6;
      if(x1+r1 >= x2-r2){ collided = true; vFinal = (m1*v1cur)/(m1+m2); }
    } else if(collided){
      x1 += vFinal*0.6; x2 = x1 + r1 + r2;
    }
    ctx.fillStyle='#F0CE6E'; ctx.beginPath(); ctx.arc(x1,90,r1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8FBFCB'; ctx.beginPath(); ctx.arc(x2,90,r2,0,Math.PI*2); ctx.fill();
    if(x1 < 290) requestAnimationFrame(draw);
  }
  runBtn.addEventListener('click', ()=>{ resetPositions(); running = true; requestAnimationFrame(draw); });
  [m1I,v1I,m2I].forEach(inp=>inp.addEventListener('input', ()=>{ updateReadouts(); if(!running){ resetPositions(); draw(); } }));
  updateReadouts();
  draw();
}

/* ---- Spherical mirrors: image formation using 1/f = 1/u + 1/v ---- */
function initMirrorActivity(card){
  card.innerHTML = `
    <h4>🪩 المرايا الكروية وتكوين الصور</h4>
    <div class="activity-note">غيّر بعد الجسم عن المرآة ونوعها (مقعرة/محدبة) وشاهد موقع الصورة ونوعها يتغير فعلياً حسب القانون العام للمرايا 1/f = 1/u + 1/v.</div>
    <canvas width="300" height="200"></canvas>
    <div class="activity-controls">
      <div style="display:flex; gap:8px; justify-content:center; margin:4px 0;">
        <button class="btn btn-yellow mrConcave">مقعرة</button>
        <button class="btn btn-outline mrConvex">محدبة</button>
      </div>
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">بعد الجسم (u)</span><span class="slider-value mrUVal">30 سم</span></div>
        <input type="range" min="5" max="100" step="1" value="30" class="mrU">
      </div>
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">البعد البؤري (f)</span><span class="slider-value mrFVal">15 سم</span></div>
        <input type="range" min="5" max="60" step="1" value="15" class="mrF">
      </div>
      <div class="formula-panel mrFormula"></div>
    </div>`;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const concaveBtn = card.querySelector('.mrConcave'), convexBtn = card.querySelector('.mrConvex');
  const uI = card.querySelector('.mrU'), fI = card.querySelector('.mrF');
  const uV = card.querySelector('.mrUVal'), fV = card.querySelector('.mrFVal');
  const formulaEl = card.querySelector('.mrFormula');
  let isConcave = true;

  function compute(){
    const u = +uI.value;
    const f = isConcave ? +fI.value : -(+fI.value);
    const v = 1/((1/f) - (1/u));
    const M = -v/u;
    return { u, f, v, M };
  }
  function update(){
    uV.textContent = uI.value+' سم'; fV.textContent = fI.value+' سم';
    const { v, M } = compute();
    const imgType = v>0 ? 'حقيقية ومقلوبة' : 'خيالية ومعتدلة';
    formulaEl.innerHTML = `1/f = 1/u + 1/v<br>بعد الصورة v ≈ ${v.toFixed(1)} سم &nbsp;|&nbsp; التكبير M ≈ ${M.toFixed(2)}<small>الصورة ${imgType}${Math.abs(M)>1?'، مكبرة':(Math.abs(M)<1?'، مصغرة':'، بنفس حجم الجسم')}</small>`;
    draw();
  }
  function draw(){
    const { u, f, v, M } = compute();
    const scale = 80/Math.max(u, Math.abs(v), f, 40);
    const mx = 220;
    ctx.clearRect(0,0,300,200);
    ctx.strokeStyle = '#547059'; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(0,100); ctx.lineTo(300,100); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = '#8FBFCB'; ctx.lineWidth=4;
    ctx.beginPath();
    if(isConcave) ctx.arc(mx+70, 100, 70, Math.PI*0.65, Math.PI*1.35);
    else ctx.arc(mx-70, 100, 70, -Math.PI*0.35, Math.PI*0.35);
    ctx.stroke();
    const objX = mx - u*scale, objH = 30;
    ctx.strokeStyle = '#F0CE6E'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(objX,100); ctx.lineTo(objX,100-objH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(objX-4,100-objH+8); ctx.lineTo(objX,100-objH); ctx.lineTo(objX+4,100-objH+8); ctx.stroke();
    const imgX = mx - v*scale;
    const imgH = objH*M;
    ctx.strokeStyle = '#E58F76';
    ctx.beginPath(); ctx.moveTo(imgX,100); ctx.lineTo(imgX,100-imgH); ctx.stroke();
    ctx.beginPath();
    const dir = imgH>=0? 8 : -8;
    ctx.moveTo(imgX-4,100-imgH+dir); ctx.lineTo(imgX,100-imgH); ctx.lineTo(imgX+4,100-imgH+dir); ctx.stroke();
  }
  concaveBtn.addEventListener('click', ()=>{ isConcave=true; concaveBtn.className='btn btn-yellow mrConcave'; convexBtn.className='btn btn-outline mrConvex'; update(); });
  convexBtn.addEventListener('click', ()=>{ isConcave=false; convexBtn.className='btn btn-yellow mrConvex'; concaveBtn.className='btn btn-outline mrConcave'; update(); });
  uI.addEventListener('input', update);
  fI.addEventListener('input', update);
  update();
}

/* ---- Solenoid magnetic field: B = μ0 n I ---- */
function initSolenoidActivity(card){
  card.innerHTML = `
    <h4>🧲 المجال المغناطيسي لملف لولبي</h4>
    <div class="activity-note">غيّر عدد لفات الملف وشدة التيار وطول الملف، وشاهد كثافة الفيض المغناطيسي (وكثافة خطوط المجال المرسومة) تتغير حسب B = μ₀nI.</div>
    <canvas width="280" height="160"></canvas>
    <div class="activity-controls">
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">عدد اللفات N</span><span class="slider-value solNVal">200</span></div>
        <input type="range" min="20" max="500" step="10" value="200" class="solN">
      </div>
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">التيار I (A)</span><span class="slider-value solIVal">2 A</span></div>

      </div>
      <div class="slider-row">
        <div class="slider-head"><span class="slider-label">طول الملف L (سم)</span><span class="slider-value solLVal">20 سم</span></div>
        <input type="range" min="5" max="50" step="1" value="20" class="solL">
      </div>
      <div class="formula-panel solFormula"></div>
    </div>`;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const nI = card.querySelector('.solN'), iI = card.querySelector('.solI'), lI = card.querySelector('.solL');
  const nV = card.querySelector('.solNVal'), iV = card.querySelector('.solIVal'), lV = card.querySelector('.solLVal');
  const formulaEl = card.querySelector('.solFormula');
  const mu0 = 4*Math.PI*1e-7;

  function update(){
    nV.textContent = nI.value; iV.textContent = iI.value+' A'; lV.textContent = lI.value+' سم';
    const N=+nI.value, I=+iI.value, L=(+lI.value)/100;
    const n = N/L;
    const B = mu0*n*I;
    formulaEl.innerHTML = `B = μ₀ n I &nbsp;(n = N/L)<br>n ≈ ${n.toFixed(0)} لفة/م &nbsp;|&nbsp; B ≈ ${(B*1000).toFixed(2)} mT<small>كلما زاد عدد اللفات أو التيار أو قصُر الملف، زادت كثافة الفيض المغناطيسي داخله.</small>`;
    draw(B);
  }
  function draw(B){
    ctx.clearRect(0,0,280,160);
    const loops = Math.min(16, Math.max(4, Math.round(+nI.value/25)));
    const spacing = 200/loops;
    ctx.strokeStyle = '#F0CE6E'; ctx.lineWidth=2;
    for(let i=0;i<loops;i++){
      const x = 40+i*spacing;
      ctx.beginPath(); ctx.ellipse(x,80,10,45,0,0,Math.PI*2); ctx.stroke();
    }
    const density = Math.min(10, Math.max(2, B*4000));
    ctx.strokeStyle = '#8FBFCB'; ctx.lineWidth=1.5;
    const nLines = Math.round(density);
    for(let i=0;i<nLines;i++){
      const y = 40 + i*(80/Math.max(1,nLines-1));
      ctx.beginPath(); ctx.moveTo(20,y); ctx.lineTo(260,y);
      ctx.stroke();
    }
  }
  [nI,iI,lI].forEach(inp=>inp.addEventListener('input', update));
  update();
}

/* ---- Parallel-plate capacitor: C = ε0 A/d, Q = CV ---- */
function initCapacitorActivity(card){
  card.innerHTML = `
    <h4>🔋 المتسعة الكهربائية</h4>
    <div class="activity-note">غيّر مساحة الصفيحتين والمسافة بينهما وفرق الجهد، وشاهد سعة المتسعة والشحنة المخزنة تتغيران فعلياً، مع رسم يقرّب المسافة بين الصفيحتين بصرياً.</div>

      <div class="slider-row">

      </div>
      <div class="slider-row">

        <input type="range" min="1" max="50" step="1" value="10" class="capV">
      </div>
      <div class="formula-panel capFormula"></div>
    </div>`;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const aI = card.querySelector('.capA'), dI = card.querySelector('.capD'), vI = card.querySelector('.capV');
  const aV = card.querySelector('.capAVal'), dV = card.querySelector('.capDVal'), vV = card.querySelector('.capVVal');
  const formulaEl = card.querySelector('.capFormula');
  const eps0 = 8.85e-12;

  function update(){
    aV.textContent = aI.value+' سم²'; dV.textContent = dI.value+' مم'; vV.textContent = vI.value+' V';
    const A = (+aI.value)*1e-4, d = (+dI.value)*1e-3, V = +vI.value;
    const C = eps0*A/d;
    const Q = C*V;
    formulaEl.innerHTML = `C = ε₀A/d &nbsp;، &nbsp;Q = CV<br>C ≈ ${(C*1e12).toFixed(2)} pF &nbsp;|&nbsp; Q ≈ ${(Q*1e12).toFixed(2)} pC<small>تزداد السعة بزيادة مساحة الصفيحتين وتقل بزيادة المسافة بينهما.</small>`;
    draw();
  }
  function draw(){
    ctx.clearRect(0,0,260,160);
    const d = +dI.value;
    const gap = Math.max(20, Math.min(140, d*7));
    const plateH = 30 + Math.sqrt(+aI.value)*4;
    const cx = 130;
    const x1 = cx - gap/2, x2 = cx + gap/2;
    const topY = 80 - plateH/2, botY = 80 + plateH/2;
    ctx.strokeStyle = '#F0CE6E'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(x1,topY); ctx.lineTo(x1,botY); ctx.stroke();
    ctx.strokeStyle = '#8FBFCB';
    ctx.beginPath(); ctx.moveTo(x2,topY); ctx.lineTo(x2,botY); ctx.stroke();
    ctx.fillStyle = '#F3EFE2'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('+', x1, topY-8);
    ctx.fillText('−', x2, topY-8);
    ctx.strokeStyle = '#547059'; ctx.setLineDash([2,3]);
    for(let y=topY+8; y<botY; y+=10){
      ctx.beginPath(); ctx.moveTo(x1+3,y); ctx.lineTo(x2-3,y); ctx.stroke();
    }
    ctx.setLineDash([]);
  }
  [aI,dI,vI].forEach(inp=>inp.addEventListener('input', update));
  update();
}

function submitHomework(){
  const { gradeId, hwId, hwTitle } = window._pendingHw;
  const name = document.getElementById('studentName').value.trim();
  const fileInput = document.getElementById('studentFile');
  const msg = document.getElementById('uploadMsg');
  const btn = document.getElementById('submitHwBtn');
  msg.className='modal-msg';
  if(!name){ msg.className='modal-msg err'; msg.textContent='الرجاء إدخال اسم الطالب.'; return; }
  if(!fileInput.files.length){ msg.className='modal-msg err'; msg.textContent='الرجاء اختيار ملف أو صورة.'; return; }
  const file = fileInput.files[0];
  const MAX_SIZE = 25*1024*1024;
  if(file.size > MAX_SIZE){ msg.className='modal-msg err'; msg.textContent='حجم الملف كبير جداً (الحد الأقصى 25 ميجابايت).'; return; }
  btn.disabled = true; btn.textContent='جارِ الرفع...';
  const progWrap = document.getElementById('uploadProgressWrap');
  const progBar = document.getElementById('uploadProgressBar');
  progWrap.style.display='block';

  const path = 'submissions/' + gradeId + '/' + hwId + '/' + Date.now() + '_' + file.name;
  const ref = storage.ref().child(path);
  const task = ref.put(file);
  task.on('state_changed', snap=>{
    const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
    progBar.style.width = pct + '%';
    btn.textContent = 'جارِ الرفع... ' + pct + '%';
  }, err=>{
    msg.className='modal-msg err'; msg.textContent='فشل الرفع: ' + err.message;
    btn.disabled=false; btn.textContent='إرسال الواجب';
    progWrap.style.display='none';
  }, ()=>{
    task.snapshot.ref.getDownloadURL().then(url=>{
      db.collection(COL_SUBMISSIONS).add({
        gradeId, homeworkId: hwId, homeworkTitle: hwTitle,
        studentName: name,
        fileURL: url,
        storagePath: path,
        fileType: file.type,
        fileName: file.name,
        fileSize: file.size,
        submittedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(()=>{
        msg.className='modal-msg ok'; msg.textContent='تم إرسال الواجب بنجاح ✓';
        setTimeout(closeModal, 1200);
        toast('تم إرسال الواجب بنجاح', 'ok');
        awardHomeworkPoints(hwId);
      }).catch(err=>{
        msg.className='modal-msg err'; msg.textContent='فشل الحفظ: ' + err.message;
        btn.disabled=false; btn.textContent='إرسال الواجب';
      });
    });
  });
}

function adminSwitchGrade(id){ state.adminGrade=id; renderAdmin(document.getElementById('mainRoot')); }
function adminSwitchSection(id){ state.adminSection=id; renderAdmin(document.getElementById('mainRoot')); }

function renderAdminAddRow(){
  const row = document.getElementById('addRow');
  if(state.adminSection==='submissions' || state.adminSection==='activities' || state.adminSection==='book' || state.adminSection==='analytics'){ row.innerHTML=''; return; }

  let html = `<button class="btn btn-yellow" onclick="openItemModal(null)">+ إضافة ${meta.singular}</button>`;
  if(state.adminSection==='laws' || state.adminSection==='problems' || state.adminSection==='exams'){
    html += ` <button class="btn btn-outline" onclick="openGenerateQuestionsModal()">🤖 توليد بالذكاء الاصطناعي</button>`;
  }
  if(state.adminSection==='laws'){
    html += ` <button class="btn btn-outline" onclick="seedDefaultLaws()">✨ إضافة قوانين افتراضية لهذا الصف</button>`;

function seedDefaultLaws(){
  const laws = DEFAULT_LAWS[state.adminGrade];
  if(!laws || !laws.length){ toast('لا توجد قوانين افتراضية لهذا الصف','err'); return; }
  if(!confirm('سيتم إضافة ' + laws.length + ' قوانين افتراضية إلى هذا الصف. يمكنك تعديلها أو حذفها لاحقاً. متابعة؟')) return;
  const col = db.collection(COL_GRADES).doc(state.adminGrade).collection('laws');
  const batch = db.batch();
  laws.forEach(law=>{
    const ref = col.doc();
    batch.set(ref, { ...law, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  });
  batch.commit().then(()=>{ toast('تمت إضافة القوانين الافتراضية','ok'); loadAdminList(); })
  .catch(err=>toast('فشل: '+err.message,'err'));
}

function loadAdminList(){
  const list = document.getElementById('adminList');
  if(state.adminSection==='analytics'){ loadAnalyticsTab(); return; }
  if(state.adminSection==='book'){
    db.collection(COL_GRADES).doc(state.adminGrade).collection('book').get()
    .then(snap=>{
      const byChapter = {};
      window._bookCache = {};
      snap.forEach(doc=>{ byChapter[doc.id] = doc.data(); window._bookCache[doc.id] = doc.data(); });
      let html='';
      CHAPTER_LABELS.forEach((label,i)=>{
        const chapNum = String(i+1);
        const d = byChapter[chapNum];
        html += `<div class="admin-item">
          <div class="info">
            <b>📖 ${label}</b>
            <p>${d ? esc(d.fileName||'') + ' — ' + fmtSize(d) : 'لم يُرفع ملف لهذا الفصل بعد'}</p>
          </div>
          <div class="acts">
            ${d ? `<button class="icon-btn" onclick="previewBookFile('${chapNum}')">👁</button>` : ''}
            <button class="icon-btn" onclick="openBookUploadModal('${chapNum}')">${d?'🔄':'⬆'}</button>
            ${d ? `<button class="icon-btn del" onclick="deleteBookFile('${chapNum}')">🗑</button>` : ''}
          </div>
        </div>`;
      });
      list.innerHTML = html;
    })
    .catch(err=>{ list.innerHTML = `<div class="empty-state"><b>خطأ</b>${esc(err.message)}</div>`; });
    return;
  }
  if(state.adminSection==='activities'){
    db.collection(COL_GRADES).doc(state.adminGrade).get()
    .then(doc=>{
      const enabled = (doc.exists && doc.data().activities) || [];
      let html = '';
      ACTIVITIES.forEach(a=>{
        const isOn = enabled.includes(a.id);
        html += `<div class="activity-toggle-row">
          <div><b style="font-family:'Aref Ruqaa',serif; font-size:1.15rem;">${a.icon} ${esc(a.name)}</b></div>
          <label class="switch">
            <input type="checkbox" ${isOn?'checked':''} onchange="toggleActivity('${a.id}', this.checked)">
            <span class="slider-toggle"></span>
          </label>
        </div>`;
      });
      list.innerHTML = html;
    })
    .catch(err=>{ list.innerHTML = `<div class="empty-state"><b>خطأ</b>${esc(err.message)}</div>`; });
    return;
  }
  if(state.adminSection==='submissions'){
    // Sort by date only (single-field index, always available), then filter
    // by grade client-side — avoids needing a manual composite index for
    // where(gradeId) + orderBy(submittedAt) together.
    db.collection(COL_SUBMISSIONS).orderBy('submittedAt','desc').limit(300).get()
    .then(snap=>{
      const docs = [];
      snap.forEach(doc=>{ if(doc.data().gradeId===state.adminGrade) docs.push(doc); });
      if(!docs.length){ list.innerHTML = `<div class="empty-state"><b>لا توجد واجبات مرسلة</b>لم يقم أي طالب برفع واجب لهذا الصف بعد.</div>`; return; }
      let html='';
      window._subsCache = {};
      docs.forEach(doc=>{
        const d = doc.data();
        window._subsCache[doc.id] = d;
        html += `<div class="admin-item sub-card">
          <div class="info">
            <b>${esc(d.studentName)}</b>
            <p>الواجب: ${esc(d.homeworkTitle||'—')}</p>
            <a class="sub-file-link" onclick="previewFile('${doc.id}')">عرض / تنزيل الملف (${esc(d.fileName||'ملف')})</a>
          </div>
          <div class="acts">
            <button class="icon-btn del" onclick="deleteSubmission('${doc.id}')">🗑</button>
          </div>
        </div>`;
      });
      list.innerHTML = html;
    })
    .catch(err=>{ list.innerHTML = `<div class="empty-state"><b>خطأ</b>${esc(err.message)}</div>`; });
    return;
  }
  db.collection(COL_GRADES).doc(state.adminGrade).collection(state.adminSection).orderBy('createdAt','asc').get()
  .then(snap=>{
    if(snap.empty){ list.innerHTML = `<div class="empty-state"><b>لا يوجد محتوى</b>ابدأ بإضافة عنصر جديد.</div>`; return; }
    let html='';
    window._itemsCache = {};
    snap.forEach(doc=>{
      const d = doc.data();
      window._itemsCache[doc.id] = { id: doc.id, ...d };
      html += `<div class="admin-item">
        <div class="info">
          <b>${esc(d.title)}</b>
          <p>${esc((d.content||'').slice(0,140))}${(d.content||'').length>140?'…':''}</p>
        </div>
        <div class="acts">
          <button class="icon-btn" onclick="openCopyModal('${doc.id}')">📋</button>
          <button class="icon-btn" onclick="openItemModal('${doc.id}')">✎</button>
          <button class="icon-btn del" onclick="deleteItem('${doc.id}')">🗑</button>
        </div>
      </div>`;
    });
    list.innerHTML = html;
  })
  .catch(err=>{ list.innerHTML = `<div class="empty-state"><b>خطأ</b>${esc(err.message)}</div>`; });
}

function toggleActivity(activityId, isOn){
  const ref = db.collection(COL_GRADES).doc(state.adminGrade);
  ref.get().then(doc=>{
    let enabled = (doc.exists && doc.data().activities) || [];
    if(isOn && !enabled.includes(activityId)) enabled.push(activityId);
    if(!isOn) enabled = enabled.filter(id=>id!==activityId);
    return ref.set({ activities: enabled }, { merge:true });
  }).then(()=>{ toast('تم التحديث','ok'); })
  .catch(err=>toast('فشل: '+err.message,'err'));
}

function previewFile(id){
  const d = window._subsCache && window._subsCache[id];
  if(!d) return;
  if(d.fileURL){ window.open(d.fileURL, '_blank'); return; }
  const w = window.open('');
  if(d.fileType && d.fileType.startsWith('image/')){
    w.document.write(`<title>${esc(d.fileName||'ملف')}</title><body style="margin:0;background:#111"><img src="${d.fileData}" style="max-width:100%;display:block;margin:auto;"></body>`);
  } else {
    w.document.write(`<title>${esc(d.fileName||'ملف')}</title><body style="font-family:sans-serif;padding:30px;background:#111;color:#fff">
    <p>معاينة مباشرة غير متاحة لهذا النوع من الملفات.</p>
    <a href="${d.fileData}" download="${esc(d.fileName||'file')}" style="color:#8FBFCB">اضغط هنا لتنزيل الملف</a></body>`);

function deleteSubmission(id){
  if(!confirm('هل تريد حذف هذا الواجب المرسل؟')) return;
  const d = window._subsCache && window._subsCache[id];
  db.collection(COL_SUBMISSIONS).doc(id).delete().then(()=>{

function deleteItem(id){

  db.collection(COL_GRADES).doc(state.adminGrade).collection(state.adminSection).doc(id).delete()
