/* ================= BACKUP: EXPORT / IMPORT GRADE CONTENT ================= */
function exportGradeContent(){
  const gradeId = state.adminGrade;
  const g = gradeById(gradeId);
  toast('جارِ تجهيز ملف التصدير...', '');

  const sectionIds = SECTIONS.map(s=>s.id); // laws, problems, exams, homework
  const sectionPromises = sectionIds.map(secId=>
    db.collection(COL_GRADES).doc(gradeId).collection(secId).get()
      .then(snap=>{ const arr=[]; snap.forEach(doc=>{ const d=doc.data(); arr.push({ title:d.title||'', content:d.content||'', formula:d.formula||'', videoUrl:d.videoUrl||'' }); }); return arr; })
      .catch(()=>[])
  );
  const gradeDocPromise = db.collection(COL_GRADES).doc(gradeId).get()
    .then(doc=>(doc.exists && doc.data().activities) || [])
    .catch(()=>[]);

  Promise.all([...sectionPromises, gradeDocPromise]).then(results=>{
    const activities = results.pop();
    const sections = {};
    sectionIds.forEach((id,i)=>{ sections[id] = results[i]; });

    const payload = {
      exportedFrom: 'منصّة الفيزياء — الأستاذ علي محسن',
      exportedAt: new Date().toISOString(),
      gradeId: gradeId,
      gradeName: g ? g.name : gradeId,
      sections: sections,
      activities: activities
    };

    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'physics-backup-' + gradeId + '-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('تم تنزيل النسخة الاحتياطية ✓', 'ok');
  }).catch(err=>toast('فشل التصدير: '+err.message, 'err'));
}

function triggerImportFile(){
  document.getElementById('importFileInput').click();
}

function importGradeContent(file){
  if(!file) return;
  const gradeId = state.adminGrade;
  const reader = new FileReader();
  reader.onload = function(){
    let payload;
    try{ payload = JSON.parse(reader.result); }
    catch(e){ toast('ملف غير صالح (ليس JSON سليم)', 'err'); return; }
    if(!payload.sections){ toast('صيغة الملف غير متعرّف عليها', 'err'); return; }
    if(!confirm('سيتم استيراد محتوى الملف إلى صف "' + (gradeById(gradeId)||{}).name + '". العناصر بنفس العنوان تُتخطّى تلقائياً. متابعة؟')) return;

    toast('جارِ الاستيراد...', '');
    const sectionIds = Object.keys(payload.sections);
    const jobs = sectionIds.map(secId=>{
      const items = payload.sections[secId] || [];
      if(!items.length) return Promise.resolve(0);
      const targetCol = db.collection(COL_GRADES).doc(gradeId).collection(secId);
      return targetCol.get().then(snap=>{
        const existingTitles = new Set();
        snap.forEach(doc=>existingTitles.add((doc.data().title||'').trim()));
        const batch = db.batch();
        let added = 0;
        items.forEach(it=>{
          if(existingTitles.has((it.title||'').trim())) return;
          const ref = targetCol.doc();
          batch.set(ref, {
            title: it.title || '', content: it.content || '', formula: it.formula || '', videoUrl: it.videoUrl || '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          added++;
        });
        return added ? batch.commit().then(()=>added) : 0;
      });
    });
    Promise.all(jobs).then(results=>{
      const total = results.reduce((a,b)=>a+b, 0);
      toast('تم استيراد ' + total + ' عنصر بنجاح', 'ok');
      loadAdminList();
    }).catch(err=>toast('فشل الاستيراد: '+err.message, 'err'));
  };
  reader.onerror = function(){ toast('تعذّرت قراءة الملف', 'err'); };
  reader.readAsText(file);
  document.getElementById('importFileInput').value = '';
}

      <p style="color:var(--muted); font-size:.85rem; margin-bottom:14px;">اختر الصفوف اللي تريد تنسخ لها:</p>
      <div class="copy-grade-list">
        ${otherGrades.map(g=>`
          <label class="copy-grade-item">
            <input type="checkbox" class="copyTargetGrade" value="${g.id}">
            <span>${esc(g.name)}</span>
          </label>`).join('')}
      </div>
      <label class="copy-grade-item" style="margin-top:10px; border-top:1px dashed var(--line); padding-top:12px;">
        <input type="checkbox" id="copySkipDup" checked>
        <span>تخطّي العناصر بنفس العنوان (تجنّب التكرار)</span>
      </label>
      <div class="modal-actions">
        <button class="btn btn-yellow" id="copyRunBtn" onclick="runCopy()">نسخ الآن</button>
        <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      </div>
      <div class="modal-msg" id="copyMsg"></div>
    </div>
  </div>`;
}

function runCopy(){
  const { itemId, section } = window._pendingCopy;
  const targets = Array.from(document.querySelectorAll('.copyTargetGrade:checked')).map(el=>el.value);
  const skipDup = document.getElementById('copySkipDup').checked;
  const msg = document.getElementById('copyMsg');
  const btn = document.getElementById('copyRunBtn');
  if(!targets.length){ msg.className='modal-msg err'; msg.textContent='اختر صف واحد على الأقل.'; return; }
  btn.disabled = true; btn.textContent = 'جارِ النسخ...';

  const sourceItemsPromise = itemId
    ? Promise.resolve([window._itemsCache[itemId]])
    : db.collection(COL_GRADES).doc(state.adminGrade).collection(section).get()
        .then(snap=>{ const arr=[]; snap.forEach(doc=>arr.push(doc.data())); return arr; });

  sourceItemsPromise.then(items=>{
    if(!items.length){ throw new Error('لا يوجد محتوى لنسخه.'); }
    const jobs = targets.map(gradeId=>{
      const targetCol = db.collection(COL_GRADES).doc(gradeId).collection(section);
      const existingTitlesPromise = skipDup
        ? targetCol.get().then(snap=>{ const set=new Set(); snap.forEach(doc=>set.add((doc.data().title||'').trim())); return set; })
        : Promise.resolve(new Set());
      return existingTitlesPromise.then(existingTitles=>{
        const batch = db.batch();
        let added = 0;
        items.forEach(it=>{
          if(skipDup && existingTitles.has((it.title||'').trim())) return;
          const ref = targetCol.doc();
          batch.set(ref, {
            title: it.title || '',
            content: it.content || '',
            formula: it.formula || '',
            videoUrl: it.videoUrl || '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          added++;
        });
        return added ? batch.commit().then(()=>added) : Promise.resolve(0);
      });
    });
    return Promise.all(jobs);
  }).then(results=>{
    const total = results.reduce((a,b)=>a+b, 0);
    toast('تم نسخ ' + total + ' عنصر إلى ' + targets.length + ' صف بنجاح', 'ok');
    closeModal();
  }).catch(err=>{
    msg.className='modal-msg err'; msg.textContent = 'فشل النسخ: ' + err.message;
    btn.disabled=false; btn.textContent='نسخ الآن';
  });
}

function saveBookFile(){
  const chapNum = window._pendingChapter;
  const fileInput = document.getElementById('bookFile');
  const msg = document.getElementById('bookMsg');
  const btn = document.getElementById('bookSubmitBtn');
  msg.className='modal-msg'; msg.textContent='';
  if(!fileInput.files.length){ msg.className='modal-msg err'; msg.textContent='الرجاء اختيار ملف.'; return; }
  const file = fileInput.files[0];
  const MAX_SIZE = 25*1024*1024;
  if(file.size > MAX_SIZE){
    msg.className='modal-msg err';
    msg.textContent = 'حجم الملف كبير جداً (' + (file.size/1024/1024).toFixed(1) + ' ميجابايت). الحد الأقصى 25 ميجابايت.';
    return;
  }
  btn.disabled = true; btn.textContent = 'جارِ الرفع...';
  const progWrap = document.getElementById('uploadProgressWrap');
  const progBar = document.getElementById('uploadProgressBar');
  progWrap.style.display='block';

  const path = 'books/' + state.adminGrade + '/' + chapNum + '_' + Date.now() + '_' + file.name;
  const ref = storage.ref().child(path);
  const task = ref.put(file);
  task.on('state_changed', snap=>{
    const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
    progBar.style.width = pct + '%';
    btn.textContent = 'جارِ الرفع... ' + pct + '%';
  }, err=>{
    msg.className='modal-msg err';
    msg.textContent = 'فشل الرفع: ' + err.message;
    btn.disabled=false; btn.textContent='رفع الملف';
    progWrap.style.display='none';
  }, ()=>{
    task.snapshot.ref.getDownloadURL().then(url=>{
      const oldData = window._bookCache && window._bookCache[chapNum];
      const oldPath = oldData && oldData.storagePath;
      db.collection(COL_GRADES).doc(state.adminGrade).collection('book').doc(chapNum).set({
        fileURL: url,
        storagePath: path,
        fileType: file.type,
        fileName: file.name,
        fileSize: file.size,
        uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(()=>{
        toast('تم رفع الملف بنجاح','ok');
        closeModal();
        loadAdminList();
        if(oldPath && oldPath !== path){
          storage.ref().child(oldPath).delete().catch(()=>{});
        }
      }).catch(err=>{
        msg.className='modal-msg err';
        msg.textContent = 'فشل الحفظ: ' + err.message;
        btn.disabled=false; btn.textContent='رفع الملف';
      });
    });
  });
}

function deleteBookFile(chapNum){
  if(!confirm('هل تريد حذف ملف هذا الفصل؟')) return;
  const d = window._bookCache && window._bookCache[chapNum];
  db.collection(COL_GRADES).doc(state.adminGrade).collection('book').doc(chapNum).delete()
  .then(()=>{
    toast('تم الحذف','ok');
    if(d && d.storagePath){ storage.ref().child(d.storagePath).delete().catch(()=>{}); }
    loadAdminList();
  })
  .catch(err=>toast('فشل الحذف: '+err.message,'err'));
}

function saveNewPass(){

  db.collection(COL_CONFIG).doc('settings').set({ adminPassword: val }, { merge:true })
  .then(()=>{ toast('تم تغيير كلمة المرور','ok'); closeModal(); })
  .catch(err=>{ msg.className='modal-msg err'; msg.textContent='فشل: ' + err.message; });
}

function openTelegramModal(){

    const current = (doc.exists && doc.data().telegramLink) || '';
    document.getElementById('modalRoot').innerHTML = `

function saveTelegramLink(){

  .then(()=>{ toast('تم حفظ رابط تلغرام','ok'); closeModal(); loadTelegramButton(); })
  .catch(err=>{ msg.className='modal-msg err'; msg.textContent='فشل: ' + err.message; });
}

/* ================= PWA INSTALL BUTTON ================= */
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  _deferredInstallPrompt = e;
  renderInstallButton();
});
function isIos(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }
function renderInstallButton(){
  const root = document.getElementById('installBtnRoot');
  if(!root || isStandalone()) return;
  if(_deferredInstallPrompt){
    root.innerHTML = `<button class="install-btn" onclick="triggerInstall()">📲 تثبيت التطبيق</button>`;
  } else if(isIos()){
    root.innerHTML = `<button class="install-btn" onclick="showIosInstallHelp()">📲 تثبيت التطبيق</button>`;
  }
}
function triggerInstall(){
  if(!_deferredInstallPrompt) return;
  _deferredInstallPrompt.prompt();
  _deferredInstallPrompt.userChoice.finally(()=>{
    _deferredInstallPrompt = null;
    const root = document.getElementById('installBtnRoot');
    if(root) root.innerHTML = '';
  });
}
function showIosInstallHelp(){
  document.getElementById('modalRoot').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h3>تثبيت التطبيق على آيفون</h3>
      <p style="color:var(--chalk-dim); line-height:2; font-size:.92rem;">
        1. اضغط زر المشاركة (المربع وبداخله سهم للأعلى) بالأسفل<br>
        2. اختر "إضافة إلى الشاشة الرئيسية" (Add to Home Screen)<br>
        3. اضغط "إضافة" — وسيظهر التطبيق بأيقونته الخاصة على شاشتك
      </p>
      <div class="modal-actions">
        <button class="btn btn-yellow" onclick="closeModal()">حسناً</button>
      </div>
    </div>
  </div>`;
}
renderInstallButton();
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ================= INIT ================= */
render();
loadTelegramButton();
</script>
